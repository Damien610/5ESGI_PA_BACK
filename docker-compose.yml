services:
  db_dev:
    image: postgres:15
    container_name: postgres_dev
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app_db_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - appnet_dev

  api_dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_projet_dev
    depends_on:
      - db_dev
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    volumes:
      - .:/app
    entrypoint: [ "/app/entrypoint.sh" ]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - appnet_dev

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server --console-address ":9001" /data
    networks:
      - appnet_dev

  createbucket:
    image: minio/mc
    container_name: minio-createbucket
    depends_on:
      - minio
    entrypoint: |
      /bin/sh -c "
      sleep 5 
      mc alias set local http://minio:9000 minioadmin minioadmin
      mc mb --ignore-existing local/images
      mc anonymous set download local/images
      mc ls local/images
      exit 0
      "
    networks:
      - appnet_dev

volumes:
  postgres_data_dev:
  minio_data:

networks:
  appnet_dev:
    driver: bridge